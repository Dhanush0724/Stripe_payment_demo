<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mini Shop</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__left">
        <strong>Mini Shop</strong>
      </div>
      <nav class="topbar__right">
        <button id="navItems" class="navBtn" type="button">Items</button>
        <button id="navCart" class="navBtn" type="button">Cart (<span id="cartCount">0</span>)</button>
        <button id="navCheckout" class="navBtn navBtn--primary" type="button" disabled>Checkout</button>
      </nav>
    </header>

    <main class="container">
      <section id="statusBar" class="statusBar" aria-live="polite"></section>
      <div id="viewRoot"></div>
    </main>

    <!-- Stripe.js -->
    <script src="https://js.stripe.com/v3/"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
